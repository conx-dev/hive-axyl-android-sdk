name: Publish Android SDK to Maven Central

on:
  push:
    tags:
      - "android-sdk-v*"

permissions:
  contents: read

concurrency:
  group: maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3
        with:
          gradle-version: "8.13"

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#android-sdk-v}"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Android SDK release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          configured_version="$(sed -n 's/^VERSION_NAME=//p' gradle.properties)"
          if [[ "$tag_version" != "$configured_version" ]]; then
            echo "Tag version $tag_version does not match VERSION_NAME $configured_version" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit contained in origin/main" >&2
            exit 1
          fi

          echo "version=$configured_version" >> "$GITHUB_OUTPUT"

      - name: Validate release secrets
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail

          required_variables=(
            MAVEN_CENTRAL_USERNAME
            MAVEN_CENTRAL_PASSWORD
            GPG_PRIVATE_KEY
            GPG_PASSPHRASE
            GPG_KEY_ID
          )

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "Missing GitHub secret: $variable_name" >&2
              exit 1
            fi
          done

      - name: Test and build release
        run: gradle --no-daemon --stacktrace :sdk:clean :sdk:testReleaseUnitTest :sdk:assembleRelease

      - name: Generate signed Maven Central bundle
        env:
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: gradle --no-daemon --stacktrace :sdk:generateMavenCentralBundle

      - name: Publish Maven Central bundle
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_BUNDLE: sdk/build/distributions/hive-axyl-android-sdk-${{ steps.release.outputs.version }}-maven-central.zip
          MAVEN_CENTRAL_DEPLOYMENT_NAME: hive-axyl-android-sdk-${{ steps.release.outputs.version }}
        run: scripts/publish-maven-central.sh
